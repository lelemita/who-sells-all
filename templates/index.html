<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>알라딘 중고 서적 검색</title>
    <!-- Google Fonts: Outfit & Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <!-- Tailwind CSS 4.0 CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body {
            font-family: 'Inter', 'Noto Sans KR', sans-serif;
        }

        .font-outfit {
            font-family: 'Outfit', sans-serif;
        }
    </style>
</head>

<body class="bg-slate-50 text-slate-800 min-h-screen flex flex-col transition-colors duration-300">

    <!-- Header -->
    <header class="bg-gradient-to-r from-slate-900 via-indigo-950 to-slate-900 text-white shadow-xl sticky top-0 z-40">
        <div class="max-w-6xl mx-auto px-4 py-4 md:py-6 flex flex-col md:flex-row items-center justify-between gap-4">
            <div class="flex items-center gap-3">
                <div
                    class="bg-indigo-600 p-2.5 rounded-xl shadow-lg shadow-indigo-500/30 flex items-center justify-center">
                    <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                        xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5"
                            d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.58 1.777 5 2.513m0-2.513C13.5 18 15.168 18 16.9 18s3.332.477 4.5 1.253v-13C20.168 5.477 18.5 5 16.9 5c-1.75 0-3.332.477-4.5 1.253">
                        </path>
                    </svg>
                </div>
                <div>
                    <h1
                        class="text-xl md:text-2xl font-extrabold font-outfit tracking-tight bg-clip-text text-transparent bg-gradient-to-r from-white via-slate-100 to-indigo-200">
                        알라딘의 중고 램프
                    </h1>
                    <p class="text-xs text-slate-400 font-medium mt-0.5">중고 도서 다중 매칭 검색</p>
                </div>
            </div>
            <button onclick="openSearchModal()"
                class="w-full md:w-auto inline-flex items-center justify-center gap-2 bg-indigo-600 hover:bg-indigo-500 text-white font-semibold px-5 py-2.5 rounded-xl shadow-lg shadow-indigo-600/25 hover:shadow-indigo-500/35 hover:-translate-y-0.5 transition-all duration-200 cursor-pointer">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                    xmlns="http://www.w3.org/2000/svg">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 4v16m8-8H4"></path>
                </svg>
                <span>책 추가하기</span>
            </button>
        </div>
    </header>

    <!-- Main Content -->
    <main class="max-w-6xl w-full mx-auto px-4 py-8 flex-grow grid grid-cols-1 lg:grid-cols-12 gap-8 items-start">

        <!-- Left Column: Basket / Shopping Cart (8 Cols) -->
        <section
            class="lg:col-span-7 bg-white rounded-2xl border border-slate-100 shadow-sm overflow-hidden flex flex-col">
            <div class="px-6 py-5 border-b border-slate-100 flex items-center justify-between">
                <div class="flex items-center gap-2.5">
                    <span class="text-lg font-bold font-outfit text-slate-900">담은 목록</span>
                    <span id="cart-count-badge"
                        class="bg-indigo-50 text-indigo-700 text-xs font-bold px-2.5 py-0.5 rounded-full">0</span>
                </div>
                <button onclick="clearSelectedCart()" id="btn-delete-selected"
                    class="text-xs font-semibold text-rose-600 hover:text-rose-500 hover:bg-rose-50 px-3 py-1.5 rounded-lg transition duration-200 flex items-center gap-1.5 cursor-pointer hidden">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                        xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16">
                        </path>
                    </svg>
                    <span>선택 삭제</span>
                </button>
            </div>

            <!-- Empty Cart State -->
            <div id="empty-cart-state"
                class="py-16 px-6 flex flex-col items-center justify-center text-center transition-all duration-300">
                <div class="bg-slate-50 text-slate-400 p-5 rounded-2xl mb-4 border border-slate-100/50">
                    <svg class="w-12 h-12" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                        xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                            d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"></path>
                    </svg>
                </div>
                <h3 class="text-slate-900 font-semibold mb-1">장바구니가 비어 있습니다</h3>
                <p class="text-sm text-slate-400 max-w-xs mb-6">책을 추가해 한 번에 취급하는 최고의 중고 판매점을 탐색해보세요!</p>
                <button onclick="openSearchModal()"
                    class="inline-flex items-center gap-2 text-sm font-semibold bg-slate-900 hover:bg-slate-800 text-white px-5 py-2.5 rounded-xl shadow-md transition duration-200 cursor-pointer">
                    <span>도서 추가하기</span>
                </button>
            </div>

            <!-- Cart Table Area -->
            <div id="cart-table-area" class="hidden overflow-x-auto w-full">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr
                            class="bg-slate-50 text-slate-500 font-semibold text-xs tracking-wider border-b border-slate-100">
                            <th class="py-3.5 px-6 w-12 text-center">
                                <input type="checkbox" id="cart-select-all" onclick="toggleSelectAllCart(this)"
                                    class="rounded border-slate-300 text-indigo-600 focus:ring-indigo-500 w-4 h-4 cursor-pointer">
                            </th>
                            <th class="py-3.5 px-4 w-16">표지</th>
                            <th class="py-3.5 px-4">도서명 / 정보</th>
                            <th class="py-3.5 px-6 text-center w-20">관리</th>
                        </tr>
                    </thead>
                    <tbody id="cart-items-tbody" class="divide-y divide-slate-100 text-sm">
                        <!-- Dynamic Rows -->
                    </tbody>
                </table>
            </div>

            <!-- Search Action Block -->
            <div id="cart-action-block" class="p-6 bg-slate-50/50 border-t border-slate-100 hidden">
                <button onclick="searchSellers()"
                    class="w-full inline-flex items-center justify-center gap-2 bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-3.5 px-6 rounded-xl shadow-lg shadow-indigo-600/20 hover:shadow-indigo-500/30 hover:-translate-y-0.5 transition-all duration-200 cursor-pointer">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                        xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5"
                            d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                    </svg>
                    <span>선택한 책 모두 취급하는 판매점 검색</span>
                </button>
            </div>
        </section>

        <!-- Right Column: Matcher Results (4 Cols) -->
        <section class="lg:col-span-5 flex flex-col gap-6 w-full">
            <div class="bg-white rounded-2xl border border-slate-100 shadow-sm p-6 flex flex-col">
                <div class="flex items-center justify-between mb-5">
                    <h2 class="text-lg font-bold font-outfit text-slate-900">판매자 검색 결과</h2>

                </div>

                <!-- Empty state for Proposals -->
                <div id="proposals-empty"
                    class="py-12 flex flex-col items-center justify-center text-center text-slate-400">
                    <div class="bg-slate-50 border border-slate-100 p-4 rounded-full mb-3 text-slate-300">
                        <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                            xmlns="http://www.w3.org/2000/svg">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16.01h.01">
                            </path>
                        </svg>
                    </div>
                    <p class="text-sm font-medium">결과가 여기에 표시됩니다.</p>
                    <p class="text-xs text-slate-400 max-w-xs mt-1">책을 담고 '판매점 검색' 버튼을 클릭해 결과를 확인해 보세요.</p>
                </div>

                <!-- Loading Spinner & Skeletons -->
                <div id="proposals-loading" class="hidden flex flex-col gap-4 py-4">
                    <div class="flex items-center justify-center py-6">
                        <svg class="animate-spin h-8 w-8 text-indigo-600" fill="none" viewBox="0 0 24 24">
                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4">
                            </circle>
                            <path class="opacity-75" fill="currentColor"
                                d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z">
                            </path>
                        </svg>
                    </div>
                    <div class="space-y-3">
                        <div class="h-2 bg-slate-100 rounded animate-pulse"></div>
                        <div class="h-2 bg-slate-100 rounded animate-pulse w-5/6"></div>
                        <div class="h-2 bg-slate-100 rounded animate-pulse w-2/3"></div>
                    </div>
                </div>

                <!-- Proposals List container -->
                <div id="proposals-list" class="hidden flex flex-col gap-4 max-h-[600px] overflow-y-auto pr-1">
                    <!-- Cards injection -->
                </div>
            </div>
        </section>

    </main>

    <!-- Footer -->
    <footer class="bg-white border-t border-slate-100 py-6 text-center text-xs text-slate-400 font-medium">
        <div class="max-w-6xl mx-auto px-4">
            <p>© 2026 Who Sells All? Powered by Aladin Open API.</p>
        </div>
    </footer>

    <!-- Search Modal Overlay (Full-screen Mobile, elegant box on Desktop) -->
    <div id="search-modal"
        class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-center justify-center p-4 transition-all duration-300 opacity-0 pointer-events-none">
        <div
            class="bg-white w-full max-w-2xl rounded-2xl shadow-2xl border border-slate-100 flex flex-col max-h-[85vh] md:max-h-[80vh] overflow-hidden transform scale-95 transition-all duration-300">

            <!-- Modal Header -->
            <div class="px-6 py-5 border-b border-slate-100 flex items-center justify-between bg-slate-50/50">
                <h3 class="text-lg font-bold font-outfit text-slate-900">도서 검색 및 담기</h3>
                <button onclick="closeSearchModal()"
                    class="text-slate-400 hover:text-slate-600 bg-white hover:bg-slate-100 border border-slate-100 p-2 rounded-xl transition duration-200 cursor-pointer">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                        xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5"
                            d="M6 18L18 6M6 6l12 12"></path>
                    </svg>
                </button>
            </div>

            <!-- Modal Search Input Bar -->
            <div class="px-6 py-4 border-b border-slate-100">
                <form onsubmit="performSearch(event)" class="flex gap-2.5">
                    <div class="relative flex-grow">
                        <span
                            class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none text-slate-400">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                                xmlns="http://www.w3.org/2000/svg">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                            </svg>
                        </span>
                        <input type="text" id="modal-search-input" placeholder="ISBN, 작가, 책 제목 또는 키워드를 입력해 주세요..."
                            class="w-full bg-slate-50 border border-slate-200 focus:border-indigo-500 focus:bg-white text-slate-800 text-sm pl-11 pr-4 py-3 rounded-xl focus:outline-none focus:ring-1 focus:ring-indigo-500 transition duration-200">
                    </div>
                    <button type="submit"
                        class="bg-slate-900 hover:bg-slate-800 text-white font-semibold text-sm px-6 py-3 rounded-xl shadow-md transition duration-200 cursor-pointer flex items-center gap-1.5 shrink-0">
                        <span>검색</span>
                    </button>
                </form>
            </div>

            <!-- Modal Body (Search Results) -->
            <div id="modal-body-content" class="flex-grow overflow-y-auto p-6 min-h-[250px]">
                <!-- Default empty state inside modal -->
                <div id="search-modal-empty"
                    class="py-12 flex flex-col items-center justify-center text-center text-slate-400">
                    <div class="bg-indigo-50/50 p-4 rounded-full text-indigo-500 mb-3 border border-indigo-100/50">
                        <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                            xmlns="http://www.w3.org/2000/svg">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.58 1.777 5 2.513m0-2.513C13.5 18 15.168 18 16.9 18s3.332.477 4.5 1.253v-13C20.168 5.477 18.5 5 16.9 5c-1.75 0-3.332.477-4.5 1.253">
                            </path>
                        </svg>
                    </div>
                    <p class="text-sm font-semibold">키워드로 검색해 보세요</p>
                    <p class="text-xs text-slate-400 mt-1">도서 데이터 조회는 알라딘 OpenAPI를 통해 처리됩니다.</p>
                </div>

                <!-- Modal Loading -->
                <div id="search-modal-loading" class="hidden py-16 flex justify-center">
                    <svg class="animate-spin h-10 w-10 text-indigo-600" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4">
                        </circle>
                        <path class="opacity-75" fill="currentColor"
                            d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z">
                        </path>
                    </svg>
                </div>

                <!-- Result list inside modal -->
                <div id="search-modal-results" class="hidden flex flex-col gap-4">
                    <!-- Search Item Rows -->
                </div>
            </div>
        </div>
    </div>

    <!-- Toast Notification Container -->
    <div id="toast-container" class="fixed bottom-6 right-6 z-50 flex flex-col gap-3 pointer-events-none">
        <!-- Dyn toasts -->
    </div>

    <!-- Javascript Logical Implementation -->
    <script>
        // In-memory Shopping Cart (persisted via localStorage)
        let cart = [];
        let fetchedSellers = [];

        // Life Cycle Init
        window.addEventListener('DOMContentLoaded', () => {
            loadCartFromStorage();
            renderCart();
        });

        // ----------------- Shopping Cart Actions -----------------

        function loadCartFromStorage() {
            try {
                const saved = localStorage.getItem('who-sells-all-cart');
                if (saved) {
                    cart = JSON.parse(saved);
                }
            } catch (e) {
                console.error("Cart restoration error", e);
                cart = [];
            }
        }

        function saveCartToStorage() {
            localStorage.setItem('who-sells-all-cart', JSON.stringify(cart));
        }

        function renderCart() {
            const countBadge = document.getElementById('cart-count-badge');
            const emptyState = document.getElementById('empty-cart-state');
            const tableArea = document.getElementById('cart-table-area');
            const actionBlock = document.getElementById('cart-action-block');
            const tbody = document.getElementById('cart-items-tbody');
            const deleteSelectedBtn = document.getElementById('btn-delete-selected');

            countBadge.innerText = cart.length;

            if (cart.length === 0) {
                emptyState.classList.remove('hidden');
                tableArea.classList.add('hidden');
                actionBlock.classList.add('hidden');
                deleteSelectedBtn.classList.add('hidden');
                document.getElementById('proposals-empty').classList.remove('hidden');
                document.getElementById('proposals-list').classList.add('hidden');
                return;
            }

            emptyState.classList.add('hidden');
            tableArea.classList.remove('hidden');
            actionBlock.classList.remove('hidden');
            deleteSelectedBtn.classList.remove('hidden');

            tbody.innerHTML = '';
            cart.forEach((book, index) => {
                const row = document.createElement('tr');
                row.className = 'hover:bg-slate-50/70 transition-colors duration-150 group';
                row.innerHTML = `
                    <td class="py-4 px-6 text-center">
                        <input type="checkbox" data-isbn="${book.isbn13}" ${book.selected !== false ? 'checked' : ''} onchange="toggleSelectCartItem('${book.isbn13}')" class="cart-item-checkbox rounded border-slate-300 text-indigo-600 focus:ring-indigo-500 w-4 h-4 cursor-pointer">
                    </td>
                    <td class="py-4 px-4">
                        <img src="${book.cover || 'https://via.placeholder.com/120x170'}" alt="${book.title}" class="w-12 h-16 rounded object-cover shadow-sm border border-slate-100 group-hover:scale-105 transition duration-200">
                    </td>
                    <td class="py-4 px-4 pr-6">
                        <div class="font-semibold text-slate-900 line-clamp-1 group-hover:text-indigo-600 transition duration-150">${book.title}</div>
                        <div class="text-xs text-slate-400 font-medium mt-1">${book.author || '저자 미상'}</div>
                    </td>
                    <td class="py-4 px-6 text-center">
                        <button onclick="removeFromCart('${book.isbn13}')" class="text-slate-400 hover:text-rose-600 p-2 hover:bg-rose-50 rounded-xl transition duration-200 cursor-pointer">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path>
                            </svg>
                        </button>
                    </td>
                `;
                tbody.appendChild(row);
            });

            // Update header checkbox
            updateSelectAllCheckbox();
        }

        function addToCart(itemId, isbn13, title, author, cover) {
            if (cart.some(item => item.isbn13 === isbn13)) {
                showToast("이미 담겨 있는 책입니다.", "info");
                return;
            }

            cart.push({ itemId, isbn13, title, author, cover, selected: true });
            saveCartToStorage();
            renderCart();
            showToast(`장바구니에 담겼습니다!`, "success");

            // Update Modal UI button if modal open
            const btn = document.getElementById(`modal-add-btn-${isbn13}`);
            if (btn) {
                btn.className = "bg-slate-100 text-slate-400 font-semibold text-xs px-4 py-2 rounded-lg cursor-not-allowed flex items-center gap-1 shrink-0";
                btn.disabled = true;
                btn.innerHTML = `
                    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"></path>
                    </svg>
                    <span>담김</span>
                `;
            }
        }

        function removeFromCart(isbn13) {
            cart = cart.filter(item => item.isbn13 !== isbn13);
            saveCartToStorage();
            renderCart();
            showToast("장바구니에서 도서가 제거되었습니다.", "info");
        }

        function toggleSelectCartItem(isbn13) {
            const item = cart.find(x => x.isbn13 === isbn13);
            if (item) {
                item.selected = !item.selected;
                saveCartToStorage();
                updateSelectAllCheckbox();
            }
        }

        function toggleSelectAllCart(master) {
            cart.forEach(item => {
                item.selected = master.checked;
            });
            saveCartToStorage();
            renderCart();
        }

        function updateSelectAllCheckbox() {
            const master = document.getElementById('cart-select-all');
            if (!master) return;
            const checkedCount = cart.filter(x => x.selected !== false).length;
            master.checked = checkedCount === cart.length;
        }

        function clearSelectedCart() {
            const beforeLen = cart.length;
            cart = cart.filter(item => item.selected === false);
            if (cart.length === beforeLen) {
                showToast("선택된 삭제 대상이 없습니다.", "info");
                return;
            }
            saveCartToStorage();
            renderCart();
            showToast("선택한 항목들을 장바구니에서 삭제했습니다.", "success");
        }

        // ----------------- Book Search Modal logic -----------------

        function openSearchModal() {
            const modal = document.getElementById('search-modal');
            modal.classList.remove('pointer-events-none', 'opacity-0');
            modal.querySelector('div').classList.remove('scale-95');
            modal.querySelector('div').classList.add('scale-100');
            setTimeout(() => document.getElementById('modal-search-input').focus(), 150);
        }

        function closeSearchModal() {
            const modal = document.getElementById('search-modal');
            modal.classList.add('pointer-events-none', 'opacity-0');
            modal.querySelector('div').classList.remove('scale-100');
            modal.querySelector('div').classList.add('scale-95');
        }

        async function performSearch(e) {
            if (e) e.preventDefault();
            const input = document.getElementById('modal-search-input');
            const keyword = input.value.trim();
            if (!keyword) {
                showToast("검색 키워드를 입력해 주세요.", "warning");
                return;
            }

            const emptyState = document.getElementById('search-modal-empty');
            const loadingSpinner = document.getElementById('search-modal-loading');
            const resultsContainer = document.getElementById('search-modal-results');

            emptyState.classList.add('hidden');
            loadingSpinner.classList.remove('hidden');
            resultsContainer.classList.add('hidden');

            try {
                const response = await fetch(`/v1/search?q=${encodeURIComponent(keyword)}`);
                if (!response.ok) {
                    if (response.status === 404) {
                        resultsContainer.innerHTML = `
                            <div class="py-12 text-center text-slate-400">
                                <p class="text-sm font-semibold">검색 결과가 없습니다.</p>
                                <p class="text-xs text-slate-400 mt-1">다른 키워드로 검색해 보세요.</p>
                            </div>
                        `;
                        resultsContainer.classList.remove('hidden');
                        return;
                    }
                    throw new Error("책 검색 중 백엔드 에러 발생");
                }

                const data = await response.json();
                const books = data.item || [];

                if (books.length === 0) {
                    resultsContainer.innerHTML = `
                        <div class="py-12 text-center text-slate-400">
                            <p class="text-sm font-semibold">검색 결과가 없습니다.</p>
                            <p class="text-xs text-slate-400 mt-1">다른 키워드로 검색해 보세요.</p>
                        </div>
                    `;
                    resultsContainer.classList.remove('hidden');
                    return;
                }

                resultsContainer.innerHTML = '';
                books.forEach(book => {
                    const isInCart = cart.some(x => x.isbn13 === book.isbn13);
                    const bookDiv = document.createElement('div');
                    bookDiv.className = 'flex items-center gap-4 bg-slate-50 hover:bg-slate-100/50 p-4 rounded-xl border border-slate-100 transition-colors duration-200';
                    bookDiv.innerHTML = `
                        <img src="${book.cover || 'https://via.placeholder.com/120x170'}" alt="${book.title}" class="w-14 h-20 rounded object-cover shadow-sm shrink-0">
                        <div class="flex-grow min-w-0">
                            <h4 class="font-bold text-sm text-slate-900 line-clamp-1">${book.title}</h4>
                            <p class="text-xs text-slate-500 line-clamp-1 mt-1 font-medium">${book.author || '저자 미상'}</p>
                            <p class="text-xs text-indigo-600 font-semibold font-outfit mt-1.5">${book.itemId ? 'Aladin ID: ' + book.itemId : ''}</p>
                        </div>
                        <button 
                            id="modal-add-btn-${book.isbn13}"
                            onclick="addToCart('${book.itemId}', '${book.isbn13}', \`${book.title.replace(/'/g, "\\'")}\`, \`${(book.author || '').replace(/'/g, "\\'")}\`, '${book.cover}')" 
                            ${isInCart ? 'disabled' : ''} 
                            class="${isInCart ? 'bg-slate-100 text-slate-400 font-semibold text-xs px-4 py-2 rounded-lg cursor-not-allowed flex items-center gap-1 shrink-0' : 'bg-indigo-600 hover:bg-indigo-500 text-white font-semibold text-xs px-4 py-2 rounded-lg transition duration-200 cursor-pointer flex items-center gap-1 shrink-0 shadow-sm'}"
                        >
                            ${isInCart ? `
                                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"></path>
                                </svg>
                                <span>담김</span>
                            ` : `
                                <span>담기</span>
                            `}
                        </button>
                    `;
                    resultsContainer.appendChild(bookDiv);
                });

                resultsContainer.classList.remove('hidden');

            } catch (error) {
                console.error("Book search fail", error);
                showToast("도서 검색 중 문제가 발생했습니다.", "error");
                resultsContainer.innerHTML = `
                    <div class="py-12 text-center text-rose-500">
                        <p class="text-sm font-semibold">도서 검색 실패</p>
                        <p class="text-xs text-slate-400 mt-1">API 서버와의 연결 상태를 확인하고 다시 시도해주세요.</p>
                    </div>
                `;
                resultsContainer.classList.remove('hidden');
            } finally {
                loadingSpinner.classList.add('hidden');
            }
        }

        // ----------------- Proposals Matcher Action -----------------

        async function searchSellers() {
            const selectedBooks = cart.filter(book => book.selected !== false);
            if (selectedBooks.length === 0) {
                showToast("검색을 수행할 도서를 1권 이상 선택해주세요.", "warning");
                return;
            }

            const proposalsEmpty = document.getElementById('proposals-empty');
            const proposalsLoading = document.getElementById('proposals-loading');
            const proposalsList = document.getElementById('proposals-list');

            proposalsEmpty.classList.add('hidden');
            proposalsLoading.classList.remove('hidden');
            proposalsList.classList.add('hidden');

            // Construct query parameters: /v1/proposals?isbn=...&isbn=...
            const params = new URLSearchParams();
            selectedBooks.forEach(book => {
                params.append('isbn', book.isbn13);
            });

            try {
                const response = await fetch(`/v1/proposals?${params.toString()}`);
                if (!response.ok) {
                    throw new Error("판매자 매칭 결과를 가져오지 못했습니다.");
                }

                const data = await response.json();
                fetchedSellers = data.result || [];

                sortSellers(); // This will trigger rendering

            } catch (err) {
                console.error(err);
                showToast("중고 매장 매칭 중 오류가 발생했습니다.", "error");
                proposalsEmpty.classList.remove('hidden');
                proposalsEmpty.innerHTML = `
                    <div class="text-rose-500">
                        <p class="text-sm font-semibold">매칭 검색 실패</p>
                        <p class="text-xs text-slate-400 mt-1">알라딘 스크래핑 또는 네트워크 환경을 확인해주세요.</p>
                    </div>
                `;
            } finally {
                proposalsLoading.classList.add('hidden');
            }
        }

        function sortSellers() {
            // Sort by book total price only
            fetchedSellers.sort((a, b) => a.totalPrice - b.totalPrice);
            renderSellers();
        }

        function renderSellers() {
            const proposalsList = document.getElementById('proposals-list');
            const proposalsEmpty = document.getElementById('proposals-empty');
            const selectedBooks = cart.filter(book => book.selected !== false);

            if (fetchedSellers.length === 0) {
                proposalsList.classList.add('hidden');
                proposalsEmpty.classList.remove('hidden');
                proposalsEmpty.innerHTML = `
                    <div class="py-6 flex flex-col items-center justify-center text-center text-slate-400">
                        <div class="bg-amber-50 text-amber-500 p-3 rounded-full mb-3">
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path>
                            </svg>
                        </div>
                        <p class="text-sm font-semibold">매칭되는 판매자 없음</p>
                        <p class="text-xs text-slate-400 max-w-xs mt-1">선택하신 도서 ${selectedBooks.length}권을 전부 가지고 있는 판매점이 존재하지 않습니다.</p>
                    </div>
                `;
                return;
            }

            proposalsEmpty.classList.add('hidden');
            proposalsList.classList.remove('hidden');

            proposalsList.innerHTML = '';

            fetchedSellers.forEach(seller => {
                const card = document.createElement('div');
                card.className = 'bg-slate-50 border border-slate-100 hover:border-indigo-100 p-5 rounded-2xl transition duration-200 group flex flex-col justify-between gap-4';

                const displayFeeStr = seller.deliveryFee || '배송비 정보 없음';

                card.innerHTML = `
                    <div class="flex flex-col gap-2.5">
                        <div class="flex items-center justify-between">
                            <h4 class="font-bold text-slate-900 group-hover:text-indigo-600 transition duration-150 line-clamp-1">${seller.name}</h4>
                            <span class="text-lg font-extrabold text-slate-950 font-outfit mt-0.5">
                                ${seller.totalPrice.toLocaleString()}원
                            </span>
                        </div>
                    </div>
                    <div class="mt-1 flex items-center justify-between gap-2">
                        <div class="flex flex-col">
                            <span class="text-[10px] text-slate-400 font-bold uppercase tracking-wider">(기본 ${displayFeeStr})</span>
                        </div>
                        <a href="${seller.link}" target="_blank" class="inline-flex items-center gap-1 bg-slate-900 hover:bg-slate-800 text-white font-semibold text-xs px-4 py-2.5 rounded-xl transition duration-150 cursor-pointer shadow-sm">
                            <span>매장 가기</span>
                            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"></path>
                            </svg>
                        </a>
                    </div>
                `;
                proposalsList.appendChild(card);
            });

            // Append info footnote at the end of the list
            const note = document.createElement('div');
            note.className = 'text-[10px] text-slate-400/80 leading-relaxed font-medium mt-2.5 px-1 border-l-2 border-slate-200 pl-2.5';
            note.innerHTML = `* 배송비 정보는 매장 검색 결과를 참고용으로 표시한 것이며, 총 도서 가격에 반영되어 있지 않습니다. 판매점의 무료 배송 조건(예: N만원 이상 무료)과 최종 배송비는 알라딘 장바구니에서 확인해 주시기 바랍니다.`;
            proposalsList.appendChild(note);
        }

        // ----------------- Custom Toast System -----------------

        function showToast(message, type = "success") {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `flex items-center gap-2.5 py-3 px-5 rounded-xl shadow-xl border text-sm font-semibold pointer-events-auto transform translate-y-2 opacity-0 transition-all duration-300 w-72 md:w-80`;

            const colors = {
                success: "bg-emerald-50 border-emerald-100 text-emerald-800",
                info: "bg-indigo-50 border-indigo-100 text-indigo-800",
                warning: "bg-amber-50 border-amber-100 text-amber-800",
                error: "bg-rose-50 border-rose-100 text-rose-800"
            };

            const icons = {
                success: `<svg class="w-4 h-4 text-emerald-600 shrink-0" fill="currentColor" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"></path></svg>`,
                info: `<svg class="w-4 h-4 text-indigo-600 shrink-0" fill="currentColor" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg"><path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7-4a1 1 0 11-2 0 1 1 0 012 0zM9 9a1 1 0 000 2v3a1 1 0 001 1h1a1 1 0 100-2v-3a1 1 0 00-1-1H9z" clip-rule="evenodd"></path></svg>`,
                warning: `<svg class="w-4 h-4 text-amber-600 shrink-0" fill="currentColor" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg"><path fill-rule="evenodd" d="M8.257 3.099c.765-1.36 2.722-1.36 3.486 0l5.58 9.92c.75 1.334-.213 2.98-1.742 2.98H4.42c-1.53 0-2.493-1.646-1.743-2.98l5.58-9.92zM11 13a1 1 0 11-2 0 1 1 0 012 0zm-1-8a1 1 0 00-1 1v3a1 1 0 002 0V6a1 1 0 00-1-1z" clip-rule="evenodd"></path></svg>`,
                error: `<svg class="w-4 h-4 text-rose-600 shrink-0" fill="currentColor" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd"></path></svg>`
            };

            toast.className += ` ${colors[type]}`;
            toast.innerHTML = `
                ${icons[type]}
                <span class="flex-grow leading-snug">${message}</span>
            `;

            container.appendChild(toast);

            // Animate In
            setTimeout(() => {
                toast.classList.remove('translate-y-2', 'opacity-0');
            }, 50);

            // Animate Out & Destroy
            setTimeout(() => {
                toast.classList.add('translate-y-2', 'opacity-0');
                setTimeout(() => {
                    toast.remove();
                }, 300);
            }, 3000);
        }
    </script>
</body>

</html>
